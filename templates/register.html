{% extends "layout.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-slate-800 rounded-lg shadow-xl p-8 border border-slate-700">
    <h1 class="text-3xl font-bold mb-8 text-emerald-400">{{ _('Register New User') }}</h1>

    {% if error %}
    <div class="bg-red-500/10 border border-red-500 text-red-400 p-4 rounded-lg mb-6">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/register" class="space-y-6">
        <div>
            <label class="block text-slate-400 mb-2">{{ _('Full Name') }}</label>
            <input type="text" name="name" required
                class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-emerald-500 transition">
        </div>

        <div>
            <label class="block text-slate-400 mb-2">{{ _('Phone Number') }}</label>
            <input type="tel" name="phone" required
                class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-emerald-500 transition">
        </div>

        <div>
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-2">
                <label class="block text-slate-400">{{ _('Access Tag (Scan Card)') }}</label>
                <button type="button" onclick="generateQRID()"
                    class="mt-2 md:mt-0 text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded transition flex items-center justify-center gap-1 shadow">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                    </svg>
                    {{ _('Generate Web QR ID') }}
                </button>
            </div>
            <input type="text" name="rfid_tag" id="rfid_tag_input" value="{{ rfid_prefill }}" required autofocus
                class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-emerald-500 transition font-mono text-yellow-500">
            <p class="text-xs text-slate-500 mt-1">{{ _('Click the field and scan the card, or Generate a QR ID if they
                use their phone.') }}</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-slate-400 mb-2">{{ _('Select Subscription (Optional)') }}</label>
                <select name="subscription_type"
                    class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-emerald-500 transition">
                    <option value="">-- {{ _('None') }} --</option>
                    {% for sub in sub_types %}
                    <option value="{{ sub['id'] }}">
                        {{ _(sub['name']) }}
                        {% if sub['entries_per_week'] %}
                        ({{ sub['entries_per_week'] }} {{ _('entries/week') }})
                        {% else %}
                        ({{ _('Unlimited') }})
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-slate-400 mb-2">{{ _('Select Class (Optional)') }}</label>
                <div class="flex gap-2">
                    <select name="class_id"
                        class="w-2/3 bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-emerald-500 transition">
                        <option value="">-- {{ _('None') }} --</option>
                        {% for c in classes %}
                        <option value="{{ c['id'] }}">
                            {{ c['name'] }} -
                            {% set days = [_('Mon'), _('Tue'), _('Wed'), _('Thu'), _('Fri'), _('Sat'), _('Sun')] %}
                            {{ days[c['day_of_week']] }} {{ c['start_time'] }}
                        </option>
                        {% endfor %}
                    </select>

                    <select name="class_duration"
                        class="w-1/3 bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-emerald-500 transition">
                        <option value="">{{ _('Lifetime') }}</option>
                        <option value="30">1 {{ _('Month') }}</option>
                        <option value="90">3 {{ _('Months') }}</option>
                        <option value="365">1 {{ _('Year') }}</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit"
            class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-lg transition duration-200 mt-4">
            {{ _('Create User & Assign Subscription') }}
        </button>
    </form>
</div>

<script>
    function generateQRID() {
        // Generate a 6-character random alphanumeric string prefixed with QR-
        const randomStr = Math.random().toString(36).substring(2, 8).toUpperCase();
        document.getElementById('rfid_tag_input').value = `QR-${randomStr}`;

        // Remove focus so if they press enter they don't submit accidentally or overwrite it
        document.getElementById('rfid_tag_input').blur();
    }

    // Prevent the RFID Scanner's 'Enter' keystroke from triggering accidental buttons or premature form submission
    document.getElementById('rfid_tag_input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            // Optional: you can move focus to the next logical field if you want
            document.querySelector('select[name="subscription_type"]').focus();
        }
    });
</script>
{% endblock %}
