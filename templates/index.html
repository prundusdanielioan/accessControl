{% extends "layout.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center h-[calc(100vh-10rem)]">

    <!-- Status Display -->
    <div id="status-box"
        class="w-full max-w-2xl bg-slate-800 rounded-2xl shadow-2xl p-12 text-center border-4 border-slate-700 transition-colors duration-300">
        <h1 id="status-title" class="text-6xl font-black text-slate-500 mb-4">{{ _('READY') }}</h1>
        <p id="status-message" class="text-2xl text-slate-400">{{ _('Scan card to verify access') }}</p>
    </div>

    <!-- Hidden Input for RFID Reader (acts as keyboard) -->
    <div class="mt-8 w-full max-w-md">
        <input type="text" id="rfid-input" autofocus autocomplete="off"
            class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white text-center text-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent opacity-50 hover:opacity-100 transition"
            placeholder="{{ _('Click here and scan card...') }}">
        <p class="text-slate-500 text-sm text-center mt-2">{{ _('Make sure this input is focused when scanning.') }}</p>
    </div>

    <!-- QR Code Scanner Section -->
    <div class="mt-8 w-full max-w-md text-center">
        <button id="toggle-qr-btn"
            class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 px-6 rounded-xl transition shadow-lg mb-4 flex items-center justify-center w-full gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
            </svg>
            {{ _('Open QR Code Scanner') }}
        </button>
        <div id="qr-reader"
            class="w-full hidden bg-slate-900 rounded-xl overflow-hidden border-2 border-slate-600 shadow-inner"></div>
    </div>

</div>

<!-- Load html5-qrcode -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
    const input = document.getElementById('rfid-input');
    const statusBox = document.getElementById('status-box');
    const statusTitle = document.getElementById('status-title');
    const statusMessage = document.getElementById('status-message');

    // Keep focus
    document.addEventListener('click', () => input.focus());

    // Handle Enter key (RFID readers usually send Enter at the end)
    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const rfid = input.value;
            if (rfid) {
                processScan(rfid);
                input.value = '';
            }
        }
    });

    // QR Code Scanner Logic
    const toggleQrBtn = document.getElementById('toggle-qr-btn');
    const qrReaderDiv = document.getElementById('qr-reader');
    let html5QrcodeScanner = null;
    let isScanning = false;

    toggleQrBtn.addEventListener('click', () => {
        if (qrReaderDiv.classList.contains('hidden')) {
            // Verifica daca suntem in secure context (localhost sau https)
            if (!window.isSecureContext && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                alert("{{ _('Camera access requires a secure connection. Please access the app via http://localhost:5000') }}");
                return;
            }

            // Open scanner
            qrReaderDiv.classList.remove('hidden');
            toggleQrBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
                {{ _('Close QR Code Scanner') }}`;
            toggleQrBtn.classList.replace('bg-indigo-600', 'bg-red-600');
            toggleQrBtn.classList.replace('hover:bg-indigo-500', 'hover:bg-red-500');

            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "qr-reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            }
        } else {
            // Close scanner
            qrReaderDiv.classList.add('hidden');
            toggleQrBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
                {{ _('Open QR Code Scanner') }}`;
            toggleQrBtn.classList.replace('bg-red-600', 'bg-indigo-600');
            toggleQrBtn.classList.replace('hover:bg-red-500', 'hover:bg-indigo-500');

            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear();
                html5QrcodeScanner = null;
            }
        }
    });

    function onScanSuccess(decodedText, decodedResult) {
        if (isScanning) return; // Prevent spamming backend

        isScanning = true;

        // Pausing the scanner visual feed gives good feedback
        if (html5QrcodeScanner) {
            html5QrcodeScanner.pause();
        }

        processScan(decodedText).finally(() => {
            setTimeout(() => {
                isScanning = false;
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.resume();
                }
            }, 4000); // Wait 4s before allowing another scan
        });
    }

    function onScanFailure(error) {
        // Handle scan failure - ignore silently to keep scanning
    }

    async function processScan(rfid) {
        // Reset state temporarily
        updateStatus("{{ _('PROCESSING') }}", "{{ _('Checking database...') }}", 'slate');

        try {
            const response = await fetch('/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rfid_tag: rfid })
            });
            const data = await response.json();

            let pkgInfo = '';
            if (data.sub_name) {
                pkgInfo = `
                <div class="mt-6 text-4xl font-bold bg-black/20 py-3 px-6 rounded-xl inline-block border border-white/10 shadow-inner">
                    🏷️ ${data.sub_name}
                </div>`;
            }

            const countInfo = data.weekly_count !== undefined ? ` ({{ _('This week:') }} ${data.weekly_count} {{ _('scans') }})` : '';

            let lastAttemptInfo = '';
            if (data.last_attempt) {
                const statusStr = data.last_attempt.allowed ? "{{ _('Allowed') }}" : `{{ _('Denied') }} (${data.last_attempt.reason})`;
                lastAttemptInfo = `<br><span class="text-xs font-normal opacity-80 mt-4 block tracking-wider uppercase">{{ _('Last Attempt:') }} ${data.last_attempt.timestamp} - ${statusStr}</span>`;
            }

            let userNameHTML = data.user_name;
            if (data.user_id) {
                userNameHTML = `<a href="/user/${data.user_id}" class="hover:text-white underline decoration-white/30 underline-offset-4 transition" title="{{ _('View Profile') }}">${data.user_name}</a>`;
            }

            if (data.status === 'allowed') {
                updateStatus("{{ _('ACCESS GRANTED') }}", `${userNameHTML} - ${data.message}${countInfo}${pkgInfo}${lastAttemptInfo}`, 'emerald');
                playAudio('success');
            } else if (data.status === 'warning') {
                updateStatus("{{ _('ACCESS GRANTED') }}", `${userNameHTML} - ${data.message}${countInfo}${pkgInfo}${lastAttemptInfo}`, 'yellow');
                playAudio('warning');
            } else if (data.status === 'denied') {
                updateStatus("{{ _('ACCESS DENIED') }}", `${userNameHTML} - ${data.message}${countInfo}${pkgInfo}${lastAttemptInfo}`, 'red');
                playAudio('error');
            } else if (data.status === 'unknown') {
                updateStatus("{{ _('UNKNOWN USER') }}", `{{ _('Card:') }} ${rfid}`, 'amber');
                // Optional: Redirect to register after delay
                setTimeout(() => {
                    if (confirm(`{{ _('User not found. Register card') }} ${rfid}?`)) {
                        window.location.href = `/register?rfid=${rfid}`;
                    }
                }, 500);
            }
        } catch (error) {
            console.error(error);
            updateStatus("{{ _('ERROR') }}", "{{ _('System error occurred') }}", 'red');
        }

        // Reset after 6 seconds
        setTimeout(() => {
            resetStatus();
        }, 6000);
    }

    function updateStatus(title, message, color) {
        statusBox.className = `w-full max-w-2xl bg-slate-800 rounded-2xl shadow-2xl p-12 text-center border-4 border-${color}-500 transition-colors duration-300`;
        statusTitle.className = `text-5xl font-black text-${color}-500 mb-4`;
        statusTitle.textContent = title;
        statusMessage.innerHTML = message;
        statusMessage.className = `text-2xl text-${color}-400`;

        // Dynamic background tint
        if (color === 'emerald') statusBox.classList.add('bg-emerald-900/20');
        if (color === 'red') statusBox.classList.add('bg-red-900/20');
        if (color === 'amber') statusBox.classList.add('bg-amber-900/20');
        if (color === 'yellow') statusBox.classList.add('bg-yellow-900/20');
    }

    function resetStatus() {
        statusBox.className = "w-full max-w-2xl bg-slate-800 rounded-2xl shadow-2xl p-12 text-center border-4 border-slate-700 transition-colors duration-300";
        statusTitle.className = "text-6xl font-black text-slate-500 mb-4";
        statusTitle.textContent = "{{ _('READY') }}";
        statusMessage.textContent = "{{ _('Scan card to verify access') }}";
        statusMessage.className = "text-2xl text-slate-400";
    }

    // Optional: Simulation of audio beeps
    function playAudio(type) {
        // In a real app, use Audio() object here
        console.log(`Playing ${type} sound`);
    }
</script>
{% endblock %}
